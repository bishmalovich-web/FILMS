<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TIPA Calculator</title>
<style>body{font-family:Arial;background:#eefdff;margin:0}header{background:#12bfd3;color:white;padding:16px}h1{margin:0}
.app{max-width:900px;margin:auto;padding:20px}
.card{background:white;border-radius:20px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.1)}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:1px solid #ccc}
button{margin-top:10px;padding:10px;border-radius:10px;background:#123942;color:white;border:0;cursor:pointer}
.result{margin-top:15px;font-size:24px;font-weight:bold;color:#079560;text-align:center}
.qr{margin-top:20px;text-align:center}
</style></head>
<body>
<header><h1>TIPA Pricing Calculator</h1></header>
<div class="app">
<div class="card">
<label>Film</label>
<select id="film"><option>TIPA 302FG</option></select>
<label>Width</label>
<input id="width" type="number" value="406">
<label>Thickness</label>
<input id="thickness" type="number" value="20">
<label>Weight</label>
<input id="weight" type="number" value="500">
<label>Margin</label>
<input id="margin" type="number" value="0.25" step="0.01">
<button onclick="calc()">Calculate</button>
<div class="result" id="res">€0.00</div>
</div>
<div class="qr">
<img id="qr">
</div>
</div>
<script>
function calc(){
let w=+weight.value||0
let m=+margin.value||0
let cost=10 // simple base
let sell=cost*(1+m)
res.innerHTML='€'+sell.toFixed(2)
}
document.getElementById('qr').src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+location.href
</script>
</body></html>
